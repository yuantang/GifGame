<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Now冥想10周年庆 - 0元抽免单</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <!-- 背景图片层 -->
        <img src="assets/background.png" class="bg-img" alt="背景">
        
        <!-- 转盘展示区域 -->
        <div class="wheel-stage">
            <div class="wheel-container">
                <img src="assets/wheel.png" id="wheelImg" class="wheel-img" alt="转盘">
                <img src="assets/pointer.png" class="pointer-img" alt="指针">
            </div>
            
            <!-- 抽奖按钮：使用用户提供的 assets/button.png -->
            <div class="draw-btn-container">
                <img src="assets/button.png" class="draw-btn-img" alt="立即抽奖">
                <button id="drawBtn" class="draw-btn-overlay"></button>
            </div>
        </div>

        <!-- 底部Logo已包含在背景图中，如需独立点击可在此添加透明层 -->
        <div class="bottom-logo-placeholder"></div>

        <!-- 悬浮规则按钮 -->
        <div id="ruleBtn" class="rule-float-btn">活动规则</div>
    </div>

    <!-- 规则详情弹窗 -->
    <div id="ruleModal" class="modal-overlay">
        <div class="modal-content rule-modal">
            <div class="modal-header">
                <h3>活动规则</h3>
                <span id="ruleModalClose" class="close-btn">&times;</span>
            </div>
            <div class="modal-body">
                <ul class="rules-list">
                    <li><strong>活动时间：</strong>3月9日-3月20日</li>
                    <li><strong>抽奖次数：</strong>每人仅限抽一次，仅限3月9日-3月20日期间报名Now冥想正式课（师资/八周减压/八周幸福/止语）的学员</li>
                    <li><strong>核对奖品：</strong>中奖后，凭中奖截图，联系报名老师核对奖品，奖品将在活动结束后1周后寄出。</li>
                    <li>本次活动最终解释权归Now冥想研习院所有</li>
                </ul>
            </div>
            <div class="modal-footer">
                <button id="ruleModalBtn" class="confirm-btn">我知道了</button>
            </div>
        </div>
    </div>

    <!-- 中奖弹窗 -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-card">
            <button class="modal-close" id="modalClose">✕</button>
            <div class="modal-icon" id="modalIcon">🎉</div>
            <h2 class="modal-title" id="modalTitle">恭喜中奖！</h2>
            <p class="modal-prize" id="modalPrize"></p>
            <p class="modal-desc" id="modalDesc"></p>
            <button class="modal-btn" id="modalBtn">知道了</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
